<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – Daffa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Quicksand:wght@500;600;700&display=swap');

        :root {
            --coral: #F4A7A7;
            --lavender: #C7B3E5;
            --mint: #9ED2C6;
            --peach: #FAD4C4;
            --cream: #FFF9F2;
            --white: #FFFFFF;
            --dark: #2F2E41;
            --text: #4A4A5A;
            --soft-shadow: 0 8px 25px rgba(0,0,0,0.04);
            --border: rgba(0,0,0,0.04);
            --frame-purple: #C7B3E5;
            --frame-orange: #FFB347;
            --frame-red: #FF6B6B;
            --frame-blue: #6BB5FF;
            --frame-green: #77DD77;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, #F8F0FF 50%, var(--white) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--text);
        }

        .admin-container {
            background: var(--white);
            border-radius: 32px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.06), 0 0 0 2px var(--frame-purple), 0 0 20px rgba(199,179,229,0.15);
            padding: 2.8rem;
            max-width: 950px;
            width: 100%;
        }

        h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--dark);
            text-align: center;
            margin-bottom: 0.3rem;
        }
        h1 span { color: var(--coral); }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 2.5rem;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .icon {
            width: 22px;
            height: 22px;
            display: inline-block;
        }

        .password-box {
            background: var(--cream);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: var(--soft-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            transition: all 0.3s;
        }

        .password-box label {
            font-weight: 600;
            color: var(--dark);
        }

        .input-group {
            display: flex;
            gap: 0.6rem;
            width: 100%;
            max-width: 380px;
        }

        input[type="password"] {
            flex: 1;
            padding: 0.75rem 1.2rem;
            border-radius: 16px;
            border: 2px solid #e0e0e0;
            font-family: inherit;
            font-size: 1rem;
            background: var(--white);
            color: var(--text);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: var(--coral);
            box-shadow: 0 0 0 3px rgba(244,167,167,0.2);
        }

        button {
            padding: 0.75rem 1.8rem;
            background: var(--coral);
            color: white;
            font-weight: 700;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(244,167,167,0.25);
            font-family: inherit;
            white-space: nowrap;
        }
        button:hover {
            background: var(--lavender);
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(199,179,229,0.35);
        }

        .logout-btn {
            background: var(--cream);
            color: var(--text);
            box-shadow: none;
            border: 1px solid var(--border);
        }
        .logout-btn:hover {
            background: var(--lavender);
            color: white;
        }

        .error {
            color: var(--frame-red);
            font-weight: 600;
            font-size: 0.9rem;
            display: none;
            margin-top: 0.5rem;
        }
        .error.show { display: block; }

        .dashboard {
            display: none;
            animation: fadeIn 0.5s;
        }
        .dashboard.visible { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .dashboard-header h2 {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.7rem;
            color: var(--dark);
        }

        .insight-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .insight-card {
            background: var(--cream);
            border-radius: 22px;
            padding: 1.5rem;
            box-shadow: var(--soft-shadow);
            text-align: center;
        }
        .insight-card h3 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 0.4rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .insight-card .value {
            font-family: 'Quicksand', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--dark);
            line-height: 1.2;
        }
        .insight-card .value span { color: var(--coral); }

        .motivation-box {
            border-radius: 22px;
            padding: 1.3rem 1.8rem;
            margin-bottom: 2rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 12px 25px rgba(0,0,0,0.06);
            background: linear-gradient(135deg, var(--lavender), var(--mint));
        }
        .motivation-box.good { background: linear-gradient(135deg, var(--mint), var(--frame-green)); }
        .motivation-box.warning { background: linear-gradient(135deg, var(--frame-orange), var(--frame-red)); }

        .chart-container {
            background: var(--cream);
            border-radius: 22px;
            padding: 1.5rem;
            box-shadow: var(--soft-shadow);
            margin-bottom: 2rem;
        }
        .chart-title {
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }
        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 0.7rem;
        }
        .bar-label {
            width: 70px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
        }
        .bar-track {
            flex: 1;
            height: 22px;
            background: rgba(0,0,0,0.04);
            border-radius: 11px;
            overflow: hidden;
            margin: 0 0.8rem;
        }
        .bar-fill {
            height: 100%;
            border-radius: 11px;
            transition: width 0.8s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 0.4rem;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            min-width: fit-content;
        }

        .section-subtitle {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
            margin-top: 2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .feedback-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: var(--soft-shadow);
            font-size: 0.9rem;
        }
        .feedback-table th {
            background: var(--lavender);
            color: white;
            font-weight: 600;
            padding: 0.9rem 1rem;
            text-align: left;
        }
        .feedback-table td {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--border);
            background: var(--white);
            color: var(--text);
            vertical-align: middle;
        }
        .stars {
            color: var(--frame-orange);
            font-size: 1rem;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .mark-read-btn {
            background: var(--mint);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.3s;
        }
        .mark-read-btn:hover {
            background: var(--frame-green);
            transform: scale(1.03);
        }

        .empty-message {
            text-align: center;
            padding: 3rem;
            color: #aaa;
            font-style: italic;
        }

        @media (max-width: 700px) {
            .admin-container {
                padding: 2rem 1.5rem;
            }
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .feedback-table {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>Daffa<span>.</span></h1>
        <div class="subtitle">
            <!-- Ikon kunci vektor -->
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Admin Dashboard – Client Feedback
        </div>

        <!-- Login Box -->
        <div id="loginBox" class="password-box">
            <label for="passwordInput">Enter password to view feedbacks</label>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Password">
                <button id="loginBtn">Login</button>
            </div>
            <div id="errorMsg" class="error">Wrong password! Try again.</div>
        </div>

        <!-- Dashboard (tersembunyi sebelum login) -->
        <div id="dashboard" class="dashboard">
            <div class="dashboard-header">
                <h2>Dashboard</h2>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>

            <!-- Insight Cards -->
            <div class="insight-grid" id="insightGrid"></div>

            <!-- Motivation Box -->
            <div id="motivationBox" class="motivation-box"></div>

            <!-- Rating Distribution Chart -->
            <div class="chart-container">
                <div class="chart-title">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                    Rating Distribution
                </div>
                <div id="chartBars"></div>
            </div>

            <!-- Feedback Table -->
            <div class="section-subtitle">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    <line x1="9" y1="14" x2="15" y2="14"></line>
                    <line x1="9" y1="10" x2="15" y2="10"></line>
                </svg>
                Recent Feedback
            </div>
            <table class="feedback-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Message</th>
                        <th>Rating</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" class="empty-message">No feedbacks yet.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const correctPassword = 'daffa123'; // Ganti jika perlu

        const loginBox = document.getElementById('loginBox');
        const dashboard = document.getElementById('dashboard');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const errorMsg = document.getElementById('errorMsg');

        loginBtn.addEventListener('click', attemptLogin);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });

        function attemptLogin() {
            if (passwordInput.value === correctPassword) {
                loginBox.style.display = 'none';
                dashboard.classList.add('visible');
                loadDashboard();
            } else {
                errorMsg.classList.add('show');
                passwordInput.value = '';
            }
        }

        logoutBtn.addEventListener('click', () => {
            dashboard.classList.remove('visible');
            loginBox.style.display = 'flex';
            passwordInput.value = '';
            errorMsg.classList.remove('show');
        });

        function loadDashboard() {
            const feedbacks = JSON.parse(localStorage.getItem('daffa_feedbacks') || '[]');
            const total = feedbacks.length;
            const avg = total ? (feedbacks.reduce((sum, f) => sum + f.rating, 0) / total).toFixed(1) : '0.0';
            const avgNum = parseFloat(avg);

            // Insight cards
            document.getElementById('insightGrid').innerHTML = `
                <div class="insight-card">
                    <h3>
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                        </svg>
                        Total
                    </h3>
                    <div class="value">${total}</div>
                </div>
                <div class="insight-card">
                    <h3>
                        <svg class="icon" viewBox="0 0 24 24" fill="var(--frame-orange)">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                        Average
                    </h3>
                    <div class="value">${avg} <span>★</span></div>
                </div>
            `;

            // Motivation box
            const box = document.getElementById('motivationBox');
            const iconCheck = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            const iconWarning = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
            if (total === 0) {
                box.className = 'motivation-box';
                box.innerHTML = `${iconCheck} No feedback yet. Keep up the great work!`;
            } else if (avgNum >= 3) {
                box.className = 'motivation-box good';
                box.innerHTML = `${iconCheck} Excellent! Your clients love your work. Keep shining!`;
            } else {
                box.className = 'motivation-box warning';
                box.innerHTML = `${iconWarning} Tip: Focus on client communication and refine your design process.`;
            }

            // Chart distribusi rating
            const dist = [0,0,0,0,0];
            feedbacks.forEach(f => { if (f.rating >= 1 && f.rating <= 5) dist[f.rating-1]++; });
            const maxCount = Math.max(...dist, 1);
            const barContainer = document.getElementById('chartBars');
            barContainer.innerHTML = dist.map((count, idx) => {
                const rating = idx + 1;
                const percent = (count / maxCount) * 100;
                const barColor = ['#FF6B6B','#FFB347','#FFD93D','#9ED2C6','#77DD77'][idx];
                return `
                <div class="bar-row">
                    <div class="bar-label">
                        <svg viewBox="0 0 24 24" fill="${barColor}" style="width:14px; height:14px; margin-right:6px;">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                        </svg>
                        ${rating}
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width:${percent}%; background:${barColor};">
                            ${count > 0 ? count : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');

            renderTable(feedbacks);
        }

        function renderTable(feedbacks) {
            const tableBody = document.getElementById('tableBody');
            if (feedbacks.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="empty-message">No feedbacks yet.</td></tr>';
                return;
            }

            tableBody.innerHTML = feedbacks.map((f, index) => {
                const date = new Date(f.date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                const starSvg = '<svg viewBox="0 0 24 24" fill="var(--frame-orange)" style="width:14px; height:14px; margin-right:2px;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
                const starsHtml = starSvg.repeat(f.rating) + '<svg viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="2" style="width:14px; height:14px; margin-right:2px;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'.repeat(5 - f.rating);
                return `<tr data-index="${index}">
                    <td>${date}</td>
                    <td><strong>${escapeHTML(f.name)}</strong></td>
                    <td>${escapeHTML(f.msg)}</td>
                    <td><span class="stars">${starsHtml}</span></td>
                    <td><button class="mark-read-btn" data-index="${index}">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        Mark Read
                    </button></td>
                </tr>`;
            }).join('');

            // Event listener untuk tombol Mark Read
            document.querySelectorAll('.mark-read-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    markAsRead(index);
                });
            });
        }

        function markAsRead(index) {
            let feedbacks = JSON.parse(localStorage.getItem('daffa_feedbacks') || '[]');
            if (index >= 0 && index < feedbacks.length) {
                feedbacks.splice(index, 1);
                localStorage.setItem('daffa_feedbacks', JSON.stringify(feedbacks));
                loadDashboard(); // Refresh otomatis
            }
        }

        function escapeHTML(str) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return str.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
